<script>
  function updateRotation(val) {
    document.querySelectorAll('.angle-val').forEach(el => el.textContent = val + '°');
    // Apply rotation to all demo planes
    document.querySelectorAll('.demo-plane').forEach(el => {
      el.style.transform = 'rotateX(60deg) rotateZ(' + val + 'deg)';
    });
    document.querySelectorAll('.demo-floor').forEach(el => {
      el.style.transform = 'rotateZ(' + val + 'deg)';
    });
  }
</script>

<style>
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    padding: 12px 16px;
    background: #f8f9fa;
    border-radius: 8px;
    border: 1px solid #dee2e6;
  }
  .slider-row input { flex: 1; }
  .demo-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
  }
  .demo-box {
    background: #fafafa;
    border: 1.5px solid #dee2e6;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .demo-canvas {
    width: 100%;
    height: 250px;
    background: #f0f5ff;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 600px;
  }
  .demo-plane {
    width: 200px;
    height: 200px;
    background: rgba(200, 230, 201, 0.5);
    border: 2px solid #81c784;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.15s;
    transform: rotateX(60deg) rotateZ(30deg);
  }
  .demo-floor {
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
    border: 2px solid #66bb6a;
    position: absolute;
    top: 0; left: 0;
    transition: transform 0.15s;
    transform: rotateZ(30deg);
  }
  .grid-dot {
    width: 6px;
    height: 6px;
    background: #2f9e44;
    border-radius: 50%;
    position: absolute;
  }
  .tree-mock {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: 20px;
  }
  .legend {
    font-size: 12px;
    color: #6d6d6d;
    margin-top: 8px;
    line-height: 1.5;
  }
  .result-box {
    background: #f6fff6;
    border: 2px solid #2f9e44;
    border-radius: 10px;
    padding: 16px;
    margin-top: 16px;
  }
</style>

<h2>30° 倾斜 + 可旋转视角</h2>
<p class="subtitle">
  拖拽滑块旋转地面视角。默认 ~<strong>30°</strong>，看起来更自然（像从侧上方看一块棋盘）。
</p>

<div class="slider-row">
  <strong>地面旋转角度：</strong>
  <input type="range" min="0" max="60" value="30" step="1"
         oninput="updateRotation(this.value)" id="rotateSlider">
  <span style="font-weight:bold;color:#2f9e44;min-width:40px;"><span class="angle-val">30</span></span>
</div>

<div class="demo-container">
  <div class="demo-box">
    <h3 style="margin:0 0 8px;font-size:14px;">菱形地面（旋转 30°）</h3>
    <div class="demo-canvas" style="perspective:600px;">
      <div class="demo-floor" style="width:180px;height:180px;">
        <div class="grid-dot" style="left:30px;top:30px;"></div>
        <div class="grid-dot" style="left:90px;top:20px;"></div>
        <div class="grid-dot" style="left:150px;top:30px;"></div>
        <div class="grid-dot" style="left:50px;top:90px;"></div>
        <div class="grid-dot" style="left:90px;top:70px;"></div>
        <div class="grid-dot" style="left:130px;top:90px;"></div>
        <div class="grid-dot" style="left:30px;top:150px;"></div>
        <div class="grid-dot" style="left:90px;top:140px;"></div>
        <div class="grid-dot" style="left:150px;top:150px;"></div>
        <div class="tree-mock" style="left:90px;top:70px;">🌲</div>
        <div class="tree-mock" style="left:50px;top:90px;">🌳</div>
        <div class="tree-mock" style="left:130px;top:90px;">🌲</div>
      </div>
    </div>
    <div class="legend">
      旋转使网格边线不再正对观察者。<br>
      网格线呈斜向——<strong>更自然</strong>。
    </div>
  </div>

  <div class="demo-box">
    <h3 style="margin:0 0 8px;font-size:14px;">等距视角示意</h3>
    <div class="demo-canvas" style="background:#f0f5ff; perspective:700px;">
      <svg width="100%" height="100%" viewBox="0 0 500 250">
        <rect x="0" y="0" width="500" height="250" fill="#f0f5ff"/>

        <!-- Ground plane rotated 30° -->
        <g transform="translate(250,140) rotate(30) skewX(-20)">
          <rect x="-140" y="-60" width="280" height="120" fill="#d4edda" stroke="#81c784" stroke-width="1.2"/>
          <!-- Grid rotated 30° relative to ground -->
          <line x1="-140" y1="-30" x2="140" y2="-30" stroke="#a8d5ad" stroke-width="0.5"/>
          <line x1="-140" y1="0" x2="140" y2="0" stroke="#a8d5ad" stroke-width="0.5"/>
          <line x1="-140" y1="30" x2="140" y2="30" stroke="#a8d5ad" stroke-width="0.5"/>
          <line x1="-80" y1="-60" x2="-80" y2="60" stroke="#a8d5ad" stroke-width="0.5"/>
          <line x1="0" y1="-60" x2="0" y2="60" stroke="#a8d5ad" stroke-width="0.5"/>
          <line x1="80" y1="-60" x2="80" y2="60" stroke="#a8d5ad" stroke-width="0.5"/>
        </g>

        <!-- Annotation -->
        <line x1="250" y1="90" x2="250" y2="30" stroke="#e8590c" stroke-width="1.5" marker-end="url(#arrowTop)"/>
        <text x="260" y="60" font-size="11" fill="#868e96">30° 旋转</text>

        <!-- Trees on rotated grid -->
        <g transform="translate(250,140) rotate(30) skewX(-20)">
          <text x="0" y="0" text-anchor="middle" font-size="24">🌲</text>
          <text x="-80" y="-30" text-anchor="middle" font-size="20">🌳</text>
          <text x="80" y="30" text-anchor="middle" font-size="18">🌲</text>
          <text x="-40" y="30" text-anchor="middle" font-size="22">🌳</text>
          <text x="40" y="-30" text-anchor="middle" font-size="16">🌲</text>
        </g>

        <defs>
          <marker id="arrowTop" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8590c"/>
          </marker>
        </defs>
      </svg>
    </div>
    <div class="legend">
      地面旋转 30° + skewX(-20°) 挤压。<br>
      树在地面上排列，朝向垂直于地面。
    </div>
  </div>
</div>

<div class="result-box">
  <h3 style="margin:0 0 8px;color:#2f9e44;">✅ 推荐方案</h3>
  <table style="font-size:13px; width:100%; border-collapse:collapse;">
    <tr><td style="padding:4px 8px;">地面倾斜</td><td style="padding:4px 8px;"><strong>30°</strong>（rotated Z）</td></tr>
    <tr><td style="padding:4px 8px;">透视压缩</td><td style="padding:4px 8px;"><strong>skewX(-20°)</strong> 或 <strong>rotateX(60°)</strong></td></tr>
    <tr><td style="padding:4px 8px;">网格旋转</td><td style="padding:4px 8px;">默认 <strong>30°</strong>，<strong>鼠标拖拽可调</strong> (±15°)</td></tr>
    <tr><td style="padding:4px 8px;">树放置</td><td style="padding:4px 8px;">吸附最近网格交点 ± 8px</td></tr>
    <tr><td style="padding:4px 8px;">交互</td><td style="padding:4px 8px;">拖拽空白区域 → 旋转地面视角</td></tr>
  </table>
</div>
